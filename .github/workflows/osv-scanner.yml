name: OSV-Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  osv-scan:
    name: OSV Vulnerability Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      fail-on-vuln: false
      scan-args: |-
        --recursive
        ./
